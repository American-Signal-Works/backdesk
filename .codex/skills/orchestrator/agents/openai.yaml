interface:
  display_name: "Orchestrator"
  short_description: "Coordinate PRD, bugfix, QA, release"
  default_prompt: "Use $orchestrator to run this feature or bugfix from contract through QA and release prep."

policy:
  allow_implicit_invocation: true

subagent_policy:
  explicit_orchestrator_invocation: "permission to use subagents when rubric calls for them"
  contract_phase:
    owner: "main-agent"
    default_for_simple_scope: "top-level-only with reason recorded"
    default_for_complex_scope: "spawn read-only explorers or reviewers when available"
    complex_example: "Figma plus auth or external service such as Resend OTP"
    required_record: "design-contract.md Subagent Discovery"
    use_for:
      - "bug reproduction, triage, and root cause discovery"
      - "Figma plus repo discovery"
      - "Figma asset and icon inventory"
      - "Figma library component state discovery"
      - "direct component-set or state-matrix source inspection"
      - "shadcndesign kit, registry, MCP, and skill preflight"
      - "auth, permissions, user data, email, payments, or external services"
      - "component primitive mapping"
      - "security and privacy risk enumeration"
    do_not_delegate:
      - "user approval"
      - "final scope ownership"
      - "final acceptance criteria ownership"
  implementation_phase:
    owner: "main-agent"
    split_by: "disjoint write scope"
    required_record: "implementation-plan.md Agent Roster"
  simplification_phase:
    owner: "main-agent"
    timing: "after initial implementation checks pass and before formal QA"
    default_for_complex_scope: "spawn simplification-engineer for behavior-preserving frontend and backend cleanup"
    required_record: "implementation-plan.md Simplification Pass"
    backend_required: true
  qa_phase:
    owner: "main-agent"
    default_for_complex_scope: "spawn independent read-only QA or security reviewer"
    required_record: "qa-review.md and fix-list.md"
    browser_e2e_required_for_user_facing_flows: true

figma_library_state_policy:
  required_for_figma_backed_work: true
  required_record:
    - "design-contract.md Figma Library State Discovery"
    - "design-contract.md Component State Matrix"
  probe: "walk nested instances, resolve main components, inspect component sets and variant properties"
  component_source_links: "ask for direct component-set, state-matrix, or library component links when nested library resolution is partial or blocked"
  authoritative_sources: "prefer direct component source links for state matrices when consuming frames do not expose nested library states"
  fallback: "repo primitive behavior plus shadcn or local component docs when remote library metadata is inaccessible"
  blocked_record: "permission, stale node, missing library access, or Developer-seat limitation"

bugfix_policy:
  required_when_mode_is_bugfix: true
  required_record:
    - "design-contract.md Bugfix Context"
    - "design-contract.md Root Cause And Fix Contract"
    - "implementation-plan.md Bugfix Plan"
    - "qa-review.md Bugfix Verification"
  reproduce_first: true
  minimum_contract:
    - "expected versus actual behavior"
    - "reproduction status and evidence"
    - "severity, user impact, affected surface"
    - "suspected root cause and fix strategy"
    - "regression test plan"
    - "verification and rollback or mitigation notes"
  use_subagents_when:
    - "bug is not yet reproduced"
    - "root cause is unclear"
    - "production, CI, auth, data, external services, or security-sensitive behavior is affected"
    - "frontend and backend investigation can happen independently"
  fix_rule: "implement the smallest durable root-cause fix; do not broaden a bugfix into feature work without approval"
  verification_rule: "run the targeted check that would have caught the bug and add or justify a regression test"

figma_asset_policy:
  required_for_figma_backed_work: true
  required_record:
    - "design-contract.md Asset And Icon Inventory"
    - "implementation-plan.md Asset Plan"
  rule: "do not silently substitute icon families or image assets"
  preferred_icon_source: "matching repo icon package or exported SVG from Figma"
  fallback_record: "approved substitution, exported asset, dependency decision, or deferred asset"

shadcndesign_policy:
  required_when_kit_is_source: true
  docs: "https://www.shadcndesign.com/docs/agent-skills"
  required_record:
    - "design-contract.md Shadcndesign Context"
    - "implementation-plan.md Component Plan"
  prerequisites:
    - "Figma MCP"
    - "shadcn MCP or shadcn CLI tooling"
    - "@shadcndesign registry in target components.json when registry components are needed"
    - "SHADCNDESIGN_LICENSE_KEY present without printing the value"
  codex_skill_install_command: "npx shadcn@latest add @shadcndesign/skills-codex"
  capabilities:
    - "generate-code for Figma frame to React component generation"
    - "import-variables for Figma style-guide token sync"
  secret_rule: "never commit real license keys, registry tokens, generated .env files, or screenshots containing secrets"
  fallback: "record blocked MCP/license/registry access and get approval before custom-building a registry component"

browser_e2e_policy:
  required_for_user_facing_flows: true
  required_record:
    - "design-contract.md Test Plan"
    - "implementation-plan.md Browser E2E Plan"
    - "qa-review.md Browser E2E Check"
  required_when:
    - "Figma-backed UI or visual implementation"
    - "routes, navigation, forms, onboarding, dashboards, or data mutations"
    - "auth, sessions, callbacks, public workflows, or authorization-sensitive UI"
    - "payment, email, upload/download, external-service, or provider-backed browser flows"
    - "responsive, keyboard, or accessibility behavior requiring runtime verification"
  optional_when: "pure backend or internal changes covered by unit and integration tests"
  preferred_framework: "repo E2E framework such as Playwright plus browser tooling for visual/manual inspection"
  minimum_coverage: "approved happy path plus one validation, error, access-denied, or recovery path for risky flows"
  blocker_record: "missing credentials, env vars, seeded data, external services, or safe test account"

scope_sizing_policy:
  required_before_implementation_plan: true
  required_record:
    - "design-contract.md Scope Size And Slice Recommendation"
    - "implementation-plan.md Approved Slice"
  split_when:
    - "multiple screens or routes"
    - "frontend plus backend work"
    - "auth, sessions, RLS, user data, or security-sensitive flows"
    - "external services, env vars, DNS, webhooks, or provider dashboard setup"
    - "multiple release or rollback boundaries"
  default_for_large_flows: "write full contract, then implement only the approved slice"

model_policy:
  default:
    model: "inherited"
    reasoning_effort: "medium"
  roles:
    contract-explorer:
      model: "gpt-5.5"
      reasoning_effort: "high"
    prd-writer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    frontend-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    backend-engineer:
      model: "gpt-5.4"
      reasoning_effort: "high"
    test-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    simplification-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    qa-reviewer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    security-reviewer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    release-manager:
      model: "gpt-5.4"
      reasoning_effort: "medium"
  escalation_triggers:
    - "authentication"
    - "authorization"
    - "secrets"
    - "PII"
    - "email delivery"
    - "payments"
    - "RLS"
    - "database migrations"
    - "dependency changes"
    - "public routes"
    - "external APIs"
